name: CI/CD Pipeline (Auto Deploy to EC2)

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ecommerce-devops-project || git clone https://github.com/YOUR_USERNAME/YOUR_REPO.git
          cd ecommerce-devops-project
          git pull

          # Stop existing container
          docker stop ecommerce-container || true
          docker rm ecommerce-container || true

          # Build new image
          docker build -t ecommerce-app -f docker/Dockerfile .

          # Run new container
          docker run -d -p 80:3000 --name ecommerce-container ecommerce-app