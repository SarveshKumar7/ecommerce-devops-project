name: CI/CD Pipeline (Auto Deploy to EC2)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to home directory
            cd ~

            # Clone repo if not exists (USE SSH ✅)
            if [ ! -d "ecommerce-devops-project" ]; then
              git clone git@github.com:SarveshKumar7/ecommerce-devops-project.git
            fi

            cd ecommerce-devops-project

            # Pull latest code
            git pull origin main

            # Stop old container
            docker stop ecommerce-container || true
            docker rm ecommerce-container || true

            # Remove old image (optional cleanup)
            docker rmi ecommerce-app || true

            # Build new image
            docker build -t ecommerce-app -f docker/Dockerfile .

            # Run container
            docker run -d -p 80:3000 --name ecommerce-container ecommerce-app