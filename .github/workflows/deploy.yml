name: CI/CD Pipeline (Auto Deploy to EC2)

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Go to home directory
            cd ~

            # Clone repo if not exists
            if [ ! -d "ecommerce-devops-project" ]; then
              git clone git@github.com:SarveshKumar7/ecommerce-devops-project.git
            fi

            cd ecommerce-devops-project

            # Pull latest code
            git pull origin main

            # 🔍 Find container using port 80 (if any)
            EXISTING_CONTAINER=$(docker ps -q --filter "publish=80")

            if [ ! -z "$EXISTING_CONTAINER" ]; then
              echo "Stopping container using port 80..."
              docker stop $EXISTING_CONTAINER
              docker rm $EXISTING_CONTAINER
            fi

            # Stop/remove old named container (safe fallback)
            docker stop ecommerce-container || true
            docker rm ecommerce-container || true

            # Remove old image safely (only if exists and not used)
            docker images -q ecommerce-app && docker rmi ecommerce-app || true

            # Build new image
            docker build -t ecommerce-app -f docker/Dockerfile .

            # Run new container
            docker run -d -p 80:3000 --name ecommerce-container ecommerce-app